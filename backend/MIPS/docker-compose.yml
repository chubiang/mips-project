version: '3.8'

services:
  # PostgreSQL (결제/정산 원장 데이터 저장용)
  postgres:
    image: postgres:15-alpine
    container_name: mips_postgres
    environment:
      POSTGRES_USER: finance_admin
      POSTGRES_PASSWORD: mips_password
      POSTGRES_DB: postgres
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - mips_postgres_data:/var/lib/postgresql/data
    restart: always

  # Redis
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Kafka (이벤트 기반 비동기 통신 핵심 - Zookeeper 없는 최신 KRaft 모드)
  kafka:
    image: bitnami/kafka:3.6
    container_name: mips_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - mips_kafka_data:/bitnami/kafka
    restart: always

  # Kafka UI (내가 발행한 이벤트를 눈으로 확인하는 관리자 대시보드)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mips_kafka_ui
    ports:
      - "8090:8080" # 브라우저에서 localhost:8090 으로 접속합니다.
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

volumes:
  mips_postgres_data:
  mips_kafka_data: