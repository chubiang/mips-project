app:
  oauth2:
    authorized-redirect-uri: http://localhost:5173/
    failed-redirect-uri: http://localhost:5173/login?error=oauth2
server:
  port: 8082
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT-URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
  data:
    redis:
      host: redis
      port: 6379
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=finance
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        default_schema: finance
        format_sql: true
    show-sql: true
  application:
    name: MIPS
jwt:
  secret-key: ${JWT_SECRET-KEY}
  access-expiration-time: 1800000  # 30분 (30 * 60 * 1000)
  refresh-expiration-time: 604800000 # 7일 (7 * 24 * 60 * 60 * 1000)
Jasypt:
  encryptor:
    password: ${Jasypt.encryptor.password}
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: info
    org.hibernate.orm.boot: info
